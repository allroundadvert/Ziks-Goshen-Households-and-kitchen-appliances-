:root{

/* TOP IMAGE */
.hero-image{
    width:100%;

}

.hero-image img{
    width:100%;

}

/* ADDRESS BAR */
.address-bar{

header{

}

}

    margin:6px 0;

    font-weight:bold;
}

/* SLIDER */
.slider{
    width:100%;
    overflow:hidden;
}

.slides{
    display:flex;
    width:200%;
    animation:slideMove 6s infinite alternate ease-in-out;
}

.slides img{
    width:50%;
    height:250px;
    object-fit:cover;
    display:block;
}

@keyframes slideMove{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
}

/* GALLERY */
.product-gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:0;
    width:100%;
}

.product-gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    display:block;
}

/* CONTAINER */
.container{
    width:95%;
    max-width:1000px;
    margin:25px auto;

    border-radius:10px;
    padding:20px;
}

h2{

    color:var(--gold);
}

/* FORM */
.products-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.product-item{
    border:1px solid var(--gold);
    padding:10px;
    background:#111;
    border-radius:8px;
}

.product-item label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:var(--gold);
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    background:#000;
    border:1px solid var(--gold);
    color:#fff;
    box-sizing:border-box;
}

textarea{
    height:60px;
    resize:none;
}

/* BUTTONS */
.buttons{
    margin-top:20px;
    text-align:center;
}

.whatsapp-btn{
    display:inline-block;
    background:#25d366;
    color:#fff;
    padding:12px 20px;
    border:none;
    cursor:pointer;
    border-radius:5px;
    font-weight:bold;
}

.call-btn{
    display:inline-block;
    background:#007bff;
    color:#fff;
    padding:12px 20px;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
    margin-left:10px;
}

/* MAP */
.map{
    width:95%;
    max-width:1000px;
    margin:20px auto;
    border:2px solid var(--gold);
}

.map iframe{
    width:100%;
    height:350px;
    border:0;

/* FOOTER */
footer{

<script>
function sendOrder(){
let rows=document.querySelectorAll(".product-item");
let message="🛒 *NEW ORDER - ZIKS GOSHEN APPLIANCES*%0A%0A";

rows.forEach(row=>{
let item=row.querySelector(".item");
let qty=row.querySelector(".qty");
let spec=row.querySelector("textarea");
let name=row.querySelector("label");

if(item.checked){
message+="✔ "+name.innerText+
"%0AQty: "+(qty.value||1)+
"%0ASpec: "+(spec.value||"None")+
"%0A%0A";
}
});

window.open("https://wa.me/2348073376974?text="+message,"_blank");
}
</script>
